version: 2
updates:
  # Monorepo npm: production dependencies only (version updates).
  # DevDependencies are updated by Cursor headless workflow (bump-dev-deps.yml).
  # Security updates for npm still run per repo settings.
  - package-ecosystem: 'npm'
    directory: '/'
    allow:
      - dependency-type: 'production'
    schedule:
      interval: 'daily'
      time: '06:00'
      timezone: 'UTC'
    open-pull-requests-limit: 10
    reviewers:
      - 'Tomco'
    assignees:
      - 'Tomco'
    commit-message:
      prefix: 'chore'
      include: 'scope'
    labels:
      - 'dependencies'
      - 'frontend'
      - 'auto-update'
    ignore:
      # Ignore major version updates for now
      - dependency-name: '*'
        update-types: ['version-update:semver-major']
    groups:
      # Group minor and patch updates together (production deps only)
      production-dependencies:
        patterns:
          - '*'
        dependency-type: 'production'
        update-types:
          - 'minor'
          - 'patch'

  # GitHub Actions
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:00'
      timezone: 'UTC'
    open-pull-requests-limit: 5
    reviewers:
      - 'Tomco'
    assignees:
      - 'Tomco'
    commit-message:
      prefix: 'ci'
      include: 'scope'
    labels:
      - 'github-actions'
      - 'ci/cd'
      - 'auto-update'

  # Docker dependencies
  - package-ecosystem: 'docker'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:00'
      timezone: 'UTC'
    open-pull-requests-limit: 5
    reviewers:
      - 'Tomco'
    assignees:
      - 'Tomco'
    commit-message:
      prefix: 'chore'
      include: 'scope'
    labels:
      - 'docker'
      - 'infrastructure'
      - 'auto-update'

  # Python Functions dependencies - ARCHIVED
  # Azure Functions have been archived to apps/functions-archive/
  # Uncomment and update directory path if restoring Azure Functions
  # - package-ecosystem: 'pip'
  #   directory: '/apps/functions-archive'
