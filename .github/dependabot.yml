  #     interval: 'daily'
  #     time: '06:00'
  #     timezone: 'UTC'
  #   open-pull-requests-limit: 10
  #   reviewers:
  #     - 'Tomco'
  #   assignees:
  #     - 'Tomco'
  #   commit-message:
  #     prefix: 'chore'
  #     include: 'scope'
